# AgentCore Evaluations — outage corpus scenario 09.
#
# Schema: .claude/skills/add-outage-scenario/SKILL.md §"Always".
# Paired with: terraform/overlays/secret-value-corrupted/
# RUNBOOK-LESS BY DESIGN (spec §3.11.2).

name: secret-value-corrupted
type: overlay
alarm_payload_type: unhealthy_host_count
alarm_name: dev-triage-secret-victim-tg-unhealthy
target_resource: dev-triage-secret-victim-tg
mandatory_mentions:
  - "Secrets Manager"
runbook_status: by_design_none
description: >
  Sidekick ECS service whose container expects a CONFIG environment
  variable to be valid JSON. The CONFIG env var is sourced from a
  Secrets Manager secret via the task definition's
  `secrets[].valueFrom` field — ECS resolves the secret at task
  startup using the execution role's IAM permissions and injects the
  resolved value as an env var. The secret value is deliberately set
  to garbage (empty string). The container's json.loads(CONFIG)
  raises JSONDecodeError; the parse failure is cached and returned
  as 503 on every health probe. UnHealthyHostCount fires. Distinct
  from 02 missing-env-var because the env var is PRESENT (via
  valueFrom) and the container script DOES see a value — the value
  is just wrong. The agent must trace the indirection from the task
  definition's secrets[] block to identify Secrets Manager as the
  source.

reference_answer: > # pragma: allowlist secret
  ALB target group dev-triage-secret-victim-tg has unhealthy targets
  because the victim container's startup config parse fails. The
  task definition's container `secrets` block shows `CONFIG` is
  sourced from a Secrets Manager secret via `valueFrom`
  (arn:aws:secretsmanager:us-east-1:042729137214:secret:dev-triage-secret-victim-config-*).
  ECS resolves that secret at task startup and injects its value as
  the CONFIG environment variable. Container logs
  (`/ecs/dev-triage-secret-victim`) show `CONFIG parse FAILED:
  JSONDecodeError: Expecting value: line 1 column 1 (char 0);
  raw_length=0` (or similar — depending on what the secret value
  resolves to). The application caches the parse failure and returns
  503 from the health endpoint on every probe; the ALB sees targets
  unhealthy with `Target.FailedHealthChecks` /
  `Target.ResponseCodeMismatch`. The task definition itself is
  correctly wired (the secret valueFrom is intentional, the
  execution role has GetSecretValue on the secret, the IAM and
  network paths are fine); the cause is at the Secrets Manager
  layer — the secret's current value is not valid JSON. The agent
  does NOT read the secret directly (least privilege; the MCP tool
  role has no general Secrets Manager read permission); the
  diagnosis cites the indirection and recommends investigating the
  secret's value via CLI/console (`aws secretsmanager get-secret-value
  --secret-id ...`) and updating to a valid JSON payload with the
  required keys. The live MCP service is unaffected.

behavioral_assertions:
  - "Agent identifies the unhealthy target group by name (dev-triage-secret-victim-tg) from the alarm payload."
  - "Agent calls runbooks_api_lookup_runbook and observes `found: false`. Per AGENT.md step 2, falls back to general principles."
  - "Agent calls ecs_api_describe_target_health and observes targets with `Target.FailedHealthChecks` (got a response, but non-200)."
  - "Agent calls ecs_api_describe_task_definition and **identifies the secrets[] block** — specifically that `CONFIG` is sourced from `valueFrom: arn:aws:secretsmanager:...`. The agent cites this indirection explicitly in its diagnosis. The agent does NOT assume the env var is missing (that's 02's failure mode) or that the application code is broken (the code is correct)."
  - "Agent calls logs_api_filter_log_events and surfaces the verbatim parse-failure line — including the exception class (e.g., JSONDecodeError), the error message, and any context the script logged (e.g., `raw_length=0` indicating an empty value)."
  - "Agent's diagnosis identifies the Secrets Manager layer as the cause. It does NOT misattribute to a missing env var (it's not missing — it's sourced from a secret), to an IAM issue (the execution role has GetSecretValue per the secrets[] mechanism working at all), or to a generic application bug."
  - "Agent's recommended remediation suggests investigating and updating the secret's value (e.g., 'check `aws secretsmanager get-secret-value --secret-id ...` and update to valid JSON'). The agent does NOT propose modifying the application code or the task definition's secrets[] wiring."
  - "Agent does not propose a remediation that touches the live MCP service or the stack's primary target group (dev-triage-app-tg)."
  - "Agent does not attempt to read the secret value directly — it's not in the MCP tool surface and the diagnosis can be made from the indirection + log evidence alone (least-privilege agent design)."

expected_tool_sequence:
  - runbooks_api_lookup_runbook
  - ecs_api_describe_target_health
  - ecs_api_describe_task_definition
  - logs_api_filter_log_events
  - runbooks_api_post_to_slack

correct_remediation: null

# Predicted dominant MAST failure mode if the agent fails this scenario.
# FM-3.3 Incorrect Verification: the most-likely failure mode is the
# agent observing "CONFIG parse failed: JSONDecodeError" in logs and
# concluding "the application code has a bug" or "the CONFIG env var
# is empty / missing" — without reading the task definition's
# `secrets[]` block and connecting the CONFIG value to the Secrets
# Manager indirection. The diagnostic leap requires noticing the
# indirection in describe_task_definition AND naming Secrets Manager
# as the source, not just citing the parse error.
mast_baseline_hypothesis: FM-3.3

comparable_baseline: >
  ITBench v2 misconfigured-secrets family + AIOpsLab config-error
  subset. STRATUS GPT-4o reports ~50% mitigation on ITBench SRE
  overall; secret-value-specific scores not separately published.
